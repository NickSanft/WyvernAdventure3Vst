name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact_suffix: win64
          - os: macos-latest
            name: macOS
            artifact_suffix: macos

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run Tests
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path "build/GBCSynth_artefacts/Release/VST3/GBC Synth.vst3","build/GBCSynth_artefacts/Release/VST3/GBC Synth.dll" -DestinationPath "GBCSynth-${{ github.ref_name }}-${{ matrix.artifact_suffix }}-VST3.zip"
          Compress-Archive -Path "build/GBCSynth_artefacts/Release/Standalone/*" -DestinationPath "GBCSynth-${{ github.ref_name }}-${{ matrix.artifact_suffix }}-Standalone.zip"
        shell: pwsh

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/GBCSynth_artefacts/Release
          zip -r "${GITHUB_WORKSPACE}/GBCSynth-${{ github.ref_name }}-${{ matrix.artifact_suffix }}-VST3.zip" VST3/
          zip -r "${GITHUB_WORKSPACE}/GBCSynth-${{ github.ref_name }}-${{ matrix.artifact_suffix }}-Standalone.zip" Standalone/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_suffix }}
          path: GBCSynth-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.zip
